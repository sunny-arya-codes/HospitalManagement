<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hospital Management System</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>"/>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div id="app">
    <!-- Navbar -->
    <nav v-if="isLoggedIn" class="navbar navbar-expand-lg navbar-dark hms-navbar">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#"><i class="bi bi-hospital me-2"></i>HMS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <template v-if="user && user.role === 'admin'">
              <li class="nav-item"><a class="nav-link" :class="{active: currentPage==='admin-dashboard'}" href="#" @click.prevent="navigate('admin-dashboard')"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
              <li class="nav-item"><a class="nav-link" :class="{active: currentPage==='admin-doctors'}" href="#" @click.prevent="navigate('admin-doctors')"><i class="bi bi-person-badge me-1"></i>Doctors</a></li>
              <li class="nav-item"><a class="nav-link" :class="{active: currentPage==='admin-patients'}" href="#" @click.prevent="navigate('admin-patients')"><i class="bi bi-people me-1"></i>Patients</a></li>
              <li class="nav-item"><a class="nav-link" :class="{active: currentPage==='admin-appointments'}" href="#" @click.prevent="navigate('admin-appointments')"><i class="bi bi-calendar-check me-1"></i>Appointments</a></li>
              <li class="nav-item"><a class="nav-link" :class="{active: currentPage==='admin-search'}" href="#" @click.prevent="navigate('admin-search')"><i class="bi bi-search me-1"></i>Search</a></li>
            </template>
            <template v-if="user && user.role === 'doctor'">
              <li class="nav-item"><a class="nav-link" :class="{active: currentPage==='doctor-dashboard'}" href="#" @click.prevent="navigate('doctor-dashboard')"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
              <li class="nav-item"><a class="nav-link" :class="{active: currentPage==='doctor-appointments'}" href="#" @click.prevent="navigate('doctor-appointments')"><i class="bi bi-calendar-check me-1"></i>Appointments</a></li>
              <li class="nav-item"><a class="nav-link" :class="{active: currentPage==='doctor-patients'}" href="#" @click.prevent="navigate('doctor-patients')"><i class="bi bi-people me-1"></i>My Patients</a></li>
              <li class="nav-item"><a class="nav-link" :class="{active: currentPage==='doctor-availability'}" href="#" @click.prevent="navigate('doctor-availability')"><i class="bi bi-clock me-1"></i>Availability</a></li>
            </template>
            <template v-if="user && user.role === 'patient'">
              <li class="nav-item"><a class="nav-link" :class="{active: currentPage==='patient-dashboard'}" href="#" @click.prevent="navigate('patient-dashboard')"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
              <li class="nav-item"><a class="nav-link" :class="{active: currentPage==='patient-doctors'}" href="#" @click.prevent="navigate('patient-doctors')"><i class="bi bi-search me-1"></i>Find Doctors</a></li>
              <li class="nav-item"><a class="nav-link" :class="{active: currentPage==='patient-appointments'}" href="#" @click.prevent="navigate('patient-appointments')"><i class="bi bi-calendar-check me-1"></i>Appointments</a></li>
              <li class="nav-item"><a class="nav-link" :class="{active: currentPage==='patient-history'}" href="#" @click.prevent="navigate('patient-history')"><i class="bi bi-clock-history me-1"></i>History</a></li>
            </template>
          </ul>
          <ul class="navbar-nav">
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#" role="button" data-bs-toggle="dropdown">
                <div class="avatar-circle">{{ userInitial }}</div>
                <span class="d-none d-lg-inline">{{ user && user.username }}</span>
                <span class="badge bg-secondary text-capitalize">{{ user && user.role }}</span>
              </a>
              <ul class="dropdown-menu dropdown-menu-end">
                <li v-if="user && user.role === 'patient'"><a class="dropdown-item" href="#" @click.prevent="navigate('patient-profile')"><i class="bi bi-person-circle me-2"></i>My Profile</a></li>
                <li v-if="user && user.role === 'doctor'"><a class="dropdown-item" href="#" @click.prevent="navigate('doctor-profile')"><i class="bi bi-person-circle me-2"></i>My Profile</a></li>
                <li><a class="dropdown-item" href="#" @click.prevent="navigate('change-password')"><i class="bi bi-key me-2"></i>Change Password</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="#" @click.prevent="logout"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Alert Toast -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999">
      <div v-for="toast in toasts" :key="toast.id" class="toast show align-items-center border-0" :class="'text-bg-'+toast.type">
        <div class="d-flex">
          <div class="toast-body"><i :class="toast.icon+' me-2'"></i>{{ toast.message }}</div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" @click="removeToast(toast.id)"></button>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content" :class="{'no-navbar': !isLoggedIn}">
      <!-- AUTH PAGES -->
      <div v-if="!isLoggedIn">
        <login-page v-if="currentPage==='login'" @login="onLogin" @go-register="navigate('register')"></login-page>
        <register-page v-if="currentPage==='register'" @login="onLogin" @go-login="navigate('login')"></register-page>
      </div>

      <!-- ADMIN PAGES -->
      <template v-if="isLoggedIn && user && user.role==='admin'">
        <admin-dashboard v-if="currentPage==='admin-dashboard'" @navigate="navigate" :api="api"></admin-dashboard>
        <admin-doctors v-if="currentPage==='admin-doctors'" @navigate="navigate" :api="api"></admin-doctors>
        <admin-patients v-if="currentPage==='admin-patients'" @navigate="navigate" :api="api"></admin-patients>
        <admin-appointments v-if="currentPage==='admin-appointments'" :api="api"></admin-appointments>
        <admin-search v-if="currentPage==='admin-search'" :api="api"></admin-search>
      </template>

      <!-- DOCTOR PAGES -->
      <template v-if="isLoggedIn && user && user.role==='doctor'">
        <doctor-dashboard v-if="currentPage==='doctor-dashboard'" @navigate="navigate" :api="api"></doctor-dashboard>
        <doctor-appointments v-if="currentPage==='doctor-appointments'" :api="api"></doctor-appointments>
        <doctor-patients v-if="currentPage==='doctor-patients'" :api="api" @navigate="navigate"></doctor-patients>
        <doctor-availability v-if="currentPage==='doctor-availability'" :api="api"></doctor-availability>
        <doctor-profile v-if="currentPage==='doctor-profile'" :api="api"></doctor-profile>
      </template>

      <!-- PATIENT PAGES -->
      <template v-if="isLoggedIn && user && user.role==='patient'">
        <patient-dashboard v-if="currentPage==='patient-dashboard'" @navigate="navigate" :api="api"></patient-dashboard>
        <patient-doctors v-if="currentPage==='patient-doctors'" :api="api" @navigate="navigate"></patient-doctors>
        <patient-appointments v-if="currentPage==='patient-appointments'" :api="api"></patient-appointments>
        <patient-history v-if="currentPage==='patient-history'" :api="api"></patient-history>
        <patient-profile v-if="currentPage==='patient-profile'" :api="api"></patient-profile>
      </template>

      <!-- Shared -->
      <change-password v-if="isLoggedIn && currentPage==='change-password'" :api="api"></change-password>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Vue 3 -->
  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.27/dist/vue.global.prod.js"></script>
  <!-- Components -->
  <script src="js/utils.js"></script>
  <script src="js/components/auth.js"></script>
  <script src="js/components/admin.js"></script>
  <script src="js/components/doctor.js"></script>
  <script src="js/components/patient.js"></script>
  <script src="js/components/shared.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
